syntax = "proto3";

// Tenant message

message TenantSettings {
  string key = 1;
  string value = 2;
}

message TenantInfo {
  optional uint64 id = 1;
  optional int64 created_at = 2;
  optional int64 updated_at = 3;
  // Status 1: normal 2: ban | 状态 1 正常 2 禁用
  optional uint32 status = 4;
  // Tenant name | 租户名称
  optional string name = 5;
  // Tenant code | 租户代码
  optional string code = 6;
  // Tenant domain | 租户域名
  optional string domain = 7;
  // Contact person | 联系人
  optional string contact_person = 8;
  // Contact phone | 联系电话
  optional string contact_phone = 9;
  // Contact email | 联系邮箱
  optional string contact_email = 10;
  // Tenant description | 租户描述
  optional string description = 11;
  // Expire time | 过期时间
  optional int64  expire_time = 12;
  // Maximum users | 最大用户数
  optional uint32 max_users = 13;
  // Tenant settings | 租户配置
  repeated TenantSettings settings = 14;
}

message TenantListResp {
  uint64 total = 1;
  repeated TenantInfo data = 2;
}

message TenantListReq {
  uint64 page = 1;
  uint64 page_size = 2;
  optional int64 created_at = 3;
  optional int64 updated_at = 4;
  optional uint32 status = 5;
  optional int64 deleted_at = 6;
  optional string name = 7;
  optional string code = 8;
  optional string domain = 9;
  optional string contact_person = 10;
  optional string contact_phone = 11;
  optional string contact_email = 12;
  optional string description = 13;
  optional int64 expire_time = 14;
  optional uint32 max_users = 15;
  repeated TenantSettings settings = 16;
}


service Core {

  // Tenant management
  // group: tenant
  rpc createTenant (TenantInfo) returns (BaseIDResp);
  // group: tenant
  rpc updateTenant (TenantInfo) returns (BaseResp);
  // group: tenant
  rpc getTenantList (TenantListReq) returns (TenantListResp);
  // group: tenant
  rpc getTenantById (IDReq) returns (TenantInfo);
  // group: tenant
  rpc deleteTenant (IDsReq) returns (BaseResp);
  // group: tenant
  rpc initTenantData (IDReq) returns (BaseResp);


}